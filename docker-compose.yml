services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: message_board
      POSTGRES_PASSWORD: message_board
      POSTGRES_DB: message_board
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U message_board"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg2://message_board:message_board@db:5432/message_board
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
