<div class="post" id="p{{ post.id }}">
    <div class="post-header">
        <span class="post-number">No. {{ post.post_number }}</span>
        {% if post.poster_id %}
            <span class="poster-id">ID: {{ post.poster_id }}</span>
        {% endif %}
        <span class="post-date">{{ post.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</span>
    </div>
    {% if post.image_path %}
    <div class="post-image">
        <img src="{{ post.image_path }}" alt="Post image" style="max-width: 200px;">
    </div>
    {% endif %}
    <div class="post-content">
        {{ post.content }}
    </div>
</div>
